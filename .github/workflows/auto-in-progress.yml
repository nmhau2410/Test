name: Auto Move Issue to In Progress on Branch Create

on:
  create:

permissions:
  issues: write
  contents: read

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move Card to In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = context.payload.ref;
            const match = branchName.match(/^(\d+)-/);
            
            if (!match) {
              console.log(`Nhánh "${branchName}" không bắt đầu bằng số Issue. Bỏ qua.`);
              return;
            }
            
            const issueNumber = parseInt(match[1], 10);
            console.log(`Phát hiện nhánh từ Issue số: #${issueNumber}`);
            
            // 1. Lấy thông tin Issue toàn diện bao gồm cả dự án liên kết (Project Items)
            const queryIssue = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    projectItems(first: 5) {
                      nodes {
                        id
                        project {
                          id
                          title
                          fields(first: 20) {
                            nodes {
                              ... on ProjectV2FieldCommon {
                                id
                                name
                              }
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const issueData = await github.graphql(queryIssue, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: issueNumber
            });
            
            const items = issueData.repository.issue.projectItems.nodes;
            if (items.length === 0) {
              console.log("Issue này chưa được gắn vào Project nào cả. Hãy add Project trước khi tạo nhánh.");
              return;
            }
            
            // 2. Chạy qua từng project đang gắn với Issue để đổi sang "In progress"
            for (const item of items) {
              const projectItemId = item.id; // Đã sửa lỗi chính tả tên biến ở đây
              const statusField = item.project.fields.nodes.find(f => f.name === 'Status');
              
              if (!statusField || !statusField.options) {
                console.log(`Không tìm thấy trường 'Status' ở dự án: ${item.project.title}`);
                continue;
              }
              
              // Tìm ID của lựa chọn có tên là "In progress"
              const inProgressOption = statusField.options.find(o => o.name.toLowerCase() === 'in progress');
              
              if (!inProgressOption) {
                console.log("Bảng dự án của bạn không có tùy chọn nào tên là 'In progress'.");
                continue;
              }
              
              // Cập nhật giá trị cột ngay lập tức trên bảng
              const mutationUpdate = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              
              await github.graphql(mutationUpdate, {
                projectId: item.project.id,
                itemId: projectItemId, // Đã sửa tên biến đồng bộ với bên trên
                fieldId: statusField.id,
                optionId: inProgressOption.id
              });
              
              console.log(`Đã kéo thành công Issue #${issueNumber} sang 'In progress' trên bảng: ${item.project.title}`);
            }
