name: Auto Move Issue to In Progress on Branch Create

on:
  create: # Kích hoạt khi bạn bấm tạo nhánh mới

permissions:
  issues: write
  contents: read

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Update Issue via CLI
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          echo "Nhánh vừa được tạo: $BRANCH_NAME"
          
          # Kiểm tra nếu nhánh bắt đầu bằng số (Ví dụ: 9-final)
          if [[ "$BRANCH_NAME" =~ ^([0-9]+)- ]]; then
            ISSUE_NUMBER="${BASH_REMATCH[1]}"
            echo "Phát hiện số Issue: #$ISSUE_NUMBER"
            
            # Tạo một cái label tạm thời để ép Issue phải cập nhật dữ liệu
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "bug"
            # Xóa luôn cái label đó đi để giữ Issue sạch sẽ như cũ
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "bug"
            
            echo "Đã ép đồng bộ trạng thái Issue thành công!"
          else
            echo "Tên nhánh không bắt đầu bằng số hiệu Issue. Bỏ qua."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
